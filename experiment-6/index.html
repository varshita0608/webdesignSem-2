<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1 id="heading">Welcome to JavaScript Lab</h1>
<input type="text" id="headingInput" placeholder="Enter new text"><br>
<div class="buttons">
<button onclick="changeHeading()">Change Heading</button>
<button onclick="changeBackground()">Change Background</button>
<button onclick="increaseFont()">Increase Font Size</button><br>
<button onclick="decreaseFont()">Decrease Font Size</button>
<button onclick="changeFontColor()">Change Font Color</button><br>
<button onclick="toggleParagraph()">Show/Hide Paragraph</button>
<button class="reset" onclick="resetPage()">Reset</button>
</div>
<p id="paragraph">
This is a sample paragraph. Click the buttons to see the changes.
</p>
</div>
<script src="main.js"></script>

</body>
</html>
