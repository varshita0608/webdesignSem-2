<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT-1 Web dev practical</title>
    <style>
        
        .head{
            background: cadetblue;
            color: white;
            text-align: center;
            padding: 8px;
        }
        body{
            text-align: center;
            margin-top: 30px;
            background-color: khaki;
        }
        input{
            padding: 10px;
            margin-top: auto;
            border-radius: 10px;
           margin: auto;


        }
        input:hover{
            color: grey;
        }
        button :hover{
            border-radius: 5px;
            color: antiquewhite;
        }
    </style>
</head>
<body>
    <div class="head">
        <h1>Even or Odd number checker</h1>
    </div>
<br><br>
    <form onsubmit="checkNum(); return false;">
        <input id="num" type="number" placeholder="Type here">
        <br><br>
        <button type="submit">Submit</button>
    </form>

    <p id="result"></p>

    <script>
        function checkNum(){
            let n = document.getElementById("num").value;

            if(n == ""){
                document.getElementById("result").innerHTML = "Error";
            }
            else if(n % 2 == 0){
                document.getElementById("result").innerHTML = "The number you entered is Even";
            }
            else{
                document.getElementById("result").innerHTML = "The number you entered is Odd";
            }
        }
    </script>

</body>
</html>
